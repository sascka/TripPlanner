{% extends 'base.html' %}

{% block title %}Вход — TripPlanner{% endblock %}

{% block content %}
<section class="container py-5 auth-page">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <h1 class="h2 mb-3">Вход</h1>
            <form class="surface" method="post">
                <div class="mb-3">
                    <label class="form-label" for="email">Почта</label>
                    <input class="form-control" id="email" name="email" type="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Пароль</label>
                    <input class="form-control" id="password" name="password" type="password" required>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" id="remember" name="remember" type="checkbox">
                    <label class="form-check-label" for="remember">Запомнить меня</label>
                </div>
                <button class="btn btn-primary w-100" type="submit">Войти</button>
            </form>
            <p class="mt-3 text-muted">Нет аккаунта? <a href="{{ url_for('auth.register') }}">Создайте его</a>.</p>
        </div>
    </div>
</section>
{% endblock %}
