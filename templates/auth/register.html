{% extends 'base.html' %}
{% block title %}Регистрация — TripPlanner{% endblock %}
{% block content %}
<section class="container py-5 auth-page">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <h1 class="h2 mb-3">Создать аккаунт</h1>
            <form class="surface" method="post">
                <div class="mb-3">
                    <label class="form-label" for="name">Имя</label>
                    <input class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="email">Почта</label>
                    <input class="form-control" id="email" name="email" type="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Пароль</label>
                    <input class="form-control" id="password" name="password" type="password" minlength="6" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="pwd2">Повтор пароля</label>
                    <input class="form-control" id="pwd2" name="pwd2" type="password" minlength="6" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">Зарегистрироваться</button>
            </form>
            <p class="mt-3 text-muted">Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войдите</a>.</p>
        </div>
    </div>
</section>
{% endblock %}
