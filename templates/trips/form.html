{% extends "base.html" %}

{% block title %}{% if trip %}Редактировать поездку{% else %}Новая поездка{% endif %} — TripPlanner{% endblock %}

{% block content %}
<section class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h2 mb-0">{% if trip %}Редактировать поездку{% else %}Новая поездка{% endif %}</h1>
                <a class="btn btn-outline-secondary" href="{{ url_for('trips.dashboard') }}">Назад</a>
            </div>
            <form class="surface" method="post">
                <div class="row g-3">
                    <div class="col-md-7">
                        <label class="form-label" for="title">Название</label>
                        <input class="form-control" id="title" name="title" value="{{ form.get('title', '') }}" required>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label" for="destination">Город</label>
                        <input class="form-control" id="destination" name="destination" value="{{ form.get('destination', '') }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="start_date">Начало</label>
                        <input class="form-control" id="start_date" name="start_date" type="date" value="{{ form.get('start_date', '') }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="end_date">Возвращение</label>
                        <input class="form-control" id="end_date" name="end_date" type="date" value="{{ form.get('end_date', '') }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="budget">Бюджет, руб.</label>
                        <input class="form-control" id="budget" name="budget" type="number" min="0" value="{{ form.get('budget', 0) }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="description">Описание</label>
                        <textarea class="form-control" id="description" name="description" rows="5">{{ form.get('description', '') }}</textarea>
                    </div>
                </div>
                <button class="btn btn-primary mt-4" type="submit">Сохранить</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
